name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_call:
  # Weekly OWASP/NVD scan so new upstream advisories are caught even without
  # a code push. Monday 06:00 UTC keeps the cve-check job off the critical
  # path during weekday work hours.
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # pull-requests: read is required for dorny/paths-filter on pull_request
  # events — without it, listFiles() fails with "Resource not accessible by
  # integration" and the changes job blocks every gated downstream job.
  pull-requests: read
  # packages: write is elevated only on the publish-images job (tags only).
  # Keeping the workflow-default at read minimizes blast radius on every
  # main/PR run.

env:
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  # Inspect the PR diff and expose which path groups changed. Downstream jobs
  # gate on `code` (binary skip-everything-on-docs-only) and `e2e` (the
  # heavy KinD job, off by default on PRs unless code under k8s/ / Java
  # sources / Makefile / workflow itself changed). The `run-e2e` label
  # remains a manual escape hatch for the rare "force-run e2e on a docs
  # change" case.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Detect changed paths
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: filter
      with:
        # Set base only on push events. dorny/paths-filter ignores `base` on
        # pull_request events and emits a warning annotation; gating via the
        # template expression keeps push runs explicit while staying silent on
        # PRs. Required for `act push` (used by `make ci-run`) which has no
        # default base ref.
        base: ${{ github.event_name == 'push' && 'main' || '' }}
        filters: |
          code:
            - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
            - 'CLAUDE.md'
          e2e:
            - 'k8s/**'
            - 'k8s-dapr-shared/**'
            - 'pom.xml'
            - 'pizza-*/pom.xml'
            - 'pizza-*/src/**'
            - 'Makefile'
            - '.github/workflows/ci.yml'
            - 'e2e/**'
            - 'scripts/**'

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version-file: '.java-version'
        distribution: 'temurin'
        cache: 'maven'

    - name: Install Maven
      run: make deps-maven

    # mise provides trivy, gitleaks, and kubeconform (pinned in .mise.toml)
    # for the static-check composite gate (format-check, checkstyle, trivy-fs,
    # trivy-config, secrets, diagrams-check, mermaid-lint, k8s-validate).
    # The act runner image has none of them preinstalled.
    - name: Install mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        cache: true

    - name: Static check
      run: make static-check

  build:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version-file: '.java-version'
        distribution: 'temurin'
        cache: 'maven'

    - name: Install Maven
      run: make deps-maven

    - name: Build
      run: make build

    # Upload JAR artifacts ONLY on tag pushes. Non-tag runs don't need the
    # jars (they're only validating the build), so skip the upload to save
    # storage/bandwidth. Retention 1 day is just long enough for any
    # downstream release consumer.
    - name: Upload build artifacts
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      continue-on-error: true
      with:
        name: service-jars
        path: |
          pizza-delivery/target/*.jar
          pizza-kitchen/target/*.jar
          pizza-store/target/*.jar
        retention-days: 1

  # Unit tests only — fast feedback loop. Runs surefire (no Testcontainers
  # heavy lifting, no Dapr sidecars). Integration tests live in their own job.
  test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version-file: '.java-version'
        distribution: 'temurin'
        cache: 'maven'

    - name: Install Maven
      run: make deps-maven

    - name: Test
      run: make test

  # Integration tests via Failsafe + Testcontainers-Dapr. Runs in its own
  # runner to avoid resource contention with the unit-test job (Dapr sidecars
  # are memory-hungry and occasionally race their wait strategies under load).
  # Also produces the merged unit+IT JaCoCo coverage report and gates on the
  # 0.80 portfolio threshold.
  integration-test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version-file: '.java-version'
        distribution: 'temurin'
        cache: 'maven'

    - name: Install Maven
      run: make deps-maven

    - name: Integration test with coverage
      run: make coverage-generate

    - name: Verify coverage threshold
      run: make coverage-check

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      continue-on-error: true
      with:
        name: coverage-report
        path: '**/target/site/jacoco/'
        retention-days: 14

  cve-check:
    needs: [static-check]
    # Gated to cut CI cost on every main push. Runs on:
    #   - tag pushes (release-time gate before shipping)
    #   - weekly schedule (catches new upstream CVEs in unchanged deps)
    #   - workflow_dispatch (ad-hoc rescan)
    # Skipped under act because the OWASP NVD download is slow and
    # unreliable in local containers; the step-level `if: !env.ACT` below
    # no-ops the actual scan.
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version-file: '.java-version'
        distribution: 'temurin'
        cache: 'maven'

    - name: Install Maven
      run: make deps-maven

    - name: Cache NVD database
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.m2/repository/org/owasp/dependency-check-data
        key: nvd-db-${{ hashFiles('pom.xml') }}
        restore-keys: nvd-db-

    # dependency-check 12.2.2 (2026-05-03) ships the upstream fix for the
    # NVD 9-digit nanosecond timestamp deserializer bug (PR #8427), so this
    # step is back to strict — failures block the release flow as designed.
    - name: OWASP dependency check
      if: ${{ !env.ACT }}
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      run: make cve-check

    - name: Upload CVE report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      continue-on-error: true
      with:
        name: cve-report
        path: '**/target/dependency-check-report.html'
        retention-days: 14
        # Suppress ::warning when the scan fails before producing an HTML
        # report (see the NVD deserializer bug noted on the run step above).
        if-no-files-found: ignore

  # MANDATORY end-to-end test job. Deploys the three services plus Dapr to
  # a KinD cluster (cloud-provider-kind LB + redis-backed pubsub/state) and
  # runs e2e/e2e-test.sh through the LoadBalancer-exposed pizza-store.
  #
  # Trigger policy:
  #   - Every push to main and every tag push (baseline coverage)
  #   - Pull requests labelled `run-e2e` (opt-in for feature branches)
  #   - Pull requests where changes.e2e=='true' (e2e-relevant paths)
  #   - Manual runs via workflow_dispatch
  #
  # KinD + image-build + Dapr install runs ~10-15 min on GitHub runners, so
  # we keep it off every PR by default and rely on static-check/build/test
  # to catch most bugs early.
  e2e:
    needs: [changes, build, test]
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) ||
      (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'run-e2e') || needs.changes.outputs.e2e == 'true')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version-file: '.java-version'
        distribution: 'temurin'
        cache: 'maven'

    - name: Install Maven
      run: make deps-maven

    # mise provides kind, kubectl, helm, trivy, gitleaks (pinned in .mise.toml)
    # for the KinD-based e2e flow.
    - name: Install mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        cache: true

    - name: Run end-to-end tests
      run: make e2e

    # DAST: ZAP baseline scan against the LB-exposed pizza-store. Runs only
    # AFTER the assertion suite passes — keeps total e2e wall-clock predictable
    # (ZAP baseline ~2 min) and avoids burning a full ZAP run on a broken
    # cluster. Baseline scan is passive (no fuzzing, no destructive payloads),
    # so safe to run against the live e2e LB. SARIF upload to the Security tab
    # makes findings reviewable per-PR. continue-on-error: true keeps the e2e
    # job from failing on advisory ZAP findings — promote to strict once the
    # baseline is clean and a regression budget is set.
    - name: Resolve LoadBalancer IP for ZAP scan
      id: lb
      run: |
        IP=$(kubectl get svc pizza-store -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        echo "url=http://${IP}/" >> "$GITHUB_OUTPUT"

    - name: ZAP baseline scan
      uses: zaproxy/action-baseline@6c5a007541891231cd9e0ddec25d4f25c59c9874 # v0.15.0
      continue-on-error: true
      with:
        target: ${{ steps.lb.outputs.url }}
        # Standard baseline rules; cmd_options lets the action push a SARIF
        # artifact upstream and a JSON report into the workflow run.
        cmd_options: '-J zap-report.json -w zap-report.md'
        fail_action: false
        allow_issue_writing: false

    - name: Upload ZAP baseline report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      continue-on-error: true
      with:
        name: zap-baseline-report
        # zaproxy/action-baseline with `-J zap-report.json -w zap-report.md`
        # produces exactly these two files. Listing speculative alternate
        # names (report_*.{html,md,json}) makes upload-artifact emit
        # per-path "does not exist" annotations — `if-no-files-found: ignore`
        # only suppresses the "no files at all" case, not per-path misses.
        path: |
          zap-report.json
          zap-report.md
        retention-days: 14
        if-no-files-found: ignore

    - name: Collect diagnostics on failure
      if: failure()
      run: |
        mkdir -p /tmp/e2e-diag
        kubectl get pods -A -o wide > /tmp/e2e-diag/pods.txt 2>&1 || true
        kubectl get events -A --sort-by=.lastTimestamp > /tmp/e2e-diag/events.txt 2>&1 || true
        for svc in pizza-store-service pizza-kitchen-service pizza-delivery-service; do \
          kubectl logs -l app=$svc --all-containers=true --tail=500 > /tmp/e2e-diag/$svc.log 2>&1 || true; \
        done

    - name: Upload e2e diagnostics
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      continue-on-error: true
      with:
        name: e2e-diagnostics
        path: /tmp/e2e-diag/
        retention-days: 7

  # First-party OCI image publish with pre-push hardening gates. Triggers
  # only on v* tag pushes and only after every validation job is green.
  # Per /harden-image-pipeline canonical pattern (Pattern A — Phase 1+2):
  #   GATE 1: Trivy image scan (CRITICAL/HIGH blocking, fixed-only).
  #   GATE 2: Spring Boot boot-marker smoke test (catches boot regressions
  #           Trivy can't see — missing classes, port binds, config errors).
  #   GATE 3: per-arch push to GHCR with `:<version>-<arch>` tag suffix.
  # The downstream `docker-manifest` job then assembles a multi-arch
  # manifest list under `:<version>` + `:latest` and cosign-signs the
  # manifest digest (single signature covers both archs).
  #
  # provenance: false / sbom: false applies to the Paketo CNB build path
  # (no buildkit attestations emitted) so the GHCR Packages "OS / Arch" tab
  # renders correctly. spring-boot:build-image only builds the host arch —
  # cross-build is not supported — so amd64/arm64 each get a native runner.
  docker:
    needs: [static-check, build, test, integration-test, cve-check, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false      # one bad service shouldn't cancel the others'
                            # in-flight scans — collect all results
      matrix:
        include:
          - { service: pizza-store,    arch: amd64, runner: ubuntu-latest      }
          - { service: pizza-store,    arch: arm64, runner: ubuntu-24.04-arm   }
          - { service: pizza-kitchen,  arch: amd64, runner: ubuntu-latest      }
          - { service: pizza-kitchen,  arch: arm64, runner: ubuntu-24.04-arm   }
          - { service: pizza-delivery, arch: amd64, runner: ubuntu-latest      }
          - { service: pizza-delivery, arch: arm64, runner: ubuntu-24.04-arm   }
    env:
      REGISTRY: ghcr.io

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version-file: '.java-version'
        distribution: 'temurin'
        cache: 'maven'

    - name: Install Maven
      run: make deps-maven

    # mise provides trivy (pinned in .mise.toml) for the image scan gate.
    - name: Install mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        cache: true

    - name: Set version from tag
      id: ver
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Set lowercase image namespace
      id: ns
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
        echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
        echo "repo=${REPO}" >> "$GITHUB_OUTPUT"

    # GATE 1+2: Build + Trivy image scan via existing make target.
    # SERVICES override scopes the loop to this matrix entry only — each
    # service builds + scans on its own runner in parallel. The matrix
    # coordinate ($SVC) renders in the GitHub UI as `docker (pizza-store,
    # amd64) / Build and scan image`, so the step name itself stays static.
    - name: Build and scan image
      run: make image-scan SERVICES='${{ matrix.service }}'

    # GATE 3 of the per-arch flow: Spring Boot boot-marker smoke test.
    # Validates the image actually boots Spring Boot before publishing —
    # catches regressions Trivy and filesystem scans miss (missing classes,
    # port bind failures, broken auto-config). Pizza services depend on
    # Dapr sidecars + state store at runtime, so the readiness probe would
    # fail without them; the boot-marker fires BEFORE any external-dep
    # check, which is exactly what we want here.
    - name: Smoke test
      run: |
        set -euo pipefail
        SVC='${{ matrix.service }}'
        docker run -d --name="${SVC}-smoke" "${SVC}:e2e"
        echo "Waiting up to 90s for Spring Boot to boot..."
        end=$((SECONDS + 90))
        while [ $SECONDS -lt $end ]; do
          if docker logs "${SVC}-smoke" 2>&1 | grep -qE 'Started [A-Z][a-zA-Z]+Application in|Tomcat started on port|Netty started on port'; then
            echo "PASS: ${SVC} container booted Spring Boot successfully"
            docker rm -f "${SVC}-smoke" >/dev/null
            exit 0
          fi
          sleep 3
        done
        echo "FAIL: ${SVC} did not reach Spring Boot start within 90s"
        docker logs "${SVC}-smoke"
        docker rm -f "${SVC}-smoke" >/dev/null || true
        exit 1

    - name: Cleanup smoke container
      if: always()
      run: docker rm -f '${{ matrix.service }}-smoke' 2>/dev/null || true

    - name: Log in to GHCR
      # renovate: datasource=github-releases depName=docker/login-action
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push per-arch tag
      env:
        SVC: ${{ matrix.service }}
        ARCH: ${{ matrix.arch }}
        VERSION: ${{ steps.ver.outputs.version }}
        OWNER: ${{ steps.ns.outputs.owner }}
        REPO: ${{ steps.ns.outputs.repo }}
      run: |
        set -euo pipefail
        # Repo-namespace (ghcr.io/<owner>/<repo>/<package>) — GITHUB_TOKEN
        # can create new packages here on first push; user-namespace cannot.
        src="${SVC}:e2e"
        dst="${REGISTRY}/${OWNER}/${REPO}/${SVC}:${VERSION}-${ARCH}"
        echo "--- ${src} → ${dst} ---"
        docker tag "${src}" "${dst}"
        docker push "${dst}"

  # Assemble multi-arch manifest list per service and cosign-sign the
  # manifest digest. Runs once after all per-arch pushes succeed. A single
  # signature on the manifest covers every arch underneath — clearer Rekor
  # trail than signing each per-arch image separately.
  docker-manifest:
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write       # cosign keyless OIDC (Sigstore Fulcio)
    strategy:
      fail-fast: false
      matrix:
        service: [pizza-store, pizza-kitchen, pizza-delivery]
    env:
      REGISTRY: ghcr.io

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Set version from tag
      id: ver
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Set lowercase image namespace
      id: ns
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
        echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
        echo "repo=${REPO}" >> "$GITHUB_OUTPUT"

    - name: Log in to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Assemble multi-arch manifest
      id: manifest
      env:
        SVC: ${{ matrix.service }}
        VERSION: ${{ steps.ver.outputs.version }}
        OWNER: ${{ steps.ns.outputs.owner }}
        REPO: ${{ steps.ns.outputs.repo }}
      run: |
        set -euo pipefail
        base="${REGISTRY}/${OWNER}/${REPO}/${SVC}"
        amd64_ref="${base}:${VERSION}-amd64"
        arm64_ref="${base}:${VERSION}-arm64"
        ver_tag="${base}:${VERSION}"
        latest_tag="${base}:latest"
        # imagetools create stitches the per-arch refs into a manifest list
        # and pushes both `:VERSION` and `:latest` pointing at the same
        # digest. -t may be repeated to push multiple tags in one call.
        docker buildx imagetools create \
          -t "${ver_tag}" \
          -t "${latest_tag}" \
          "${amd64_ref}" \
          "${arm64_ref}"
        DIGEST=$(docker buildx imagetools inspect "${ver_tag}" --format '{{ .Manifest.Digest }}')
        echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
        {
          echo 'tags<<TAGS_EOF'
          echo "${ver_tag}"
          echo "${latest_tag}"
          echo 'TAGS_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

    # Keyless OIDC signing via Sigstore Fulcio — no key material to manage,
    # signature provenance recorded in the public Rekor transparency log.
    # Sign the manifest-list digest: a single signature covers both archs.
    - name: Sign image with cosign
      env:
        TAGS: ${{ steps.manifest.outputs.tags }}
        DIGEST: ${{ steps.manifest.outputs.digest }}
      run: |
        set -euo pipefail
        while IFS= read -r tag; do
          [ -z "$tag" ] && continue
          echo "→ cosign sign ${tag}@${DIGEST}"
          cosign sign --yes "${tag}@${DIGEST}"
        done <<< "${TAGS}"

  ci-pass:
    if: always()
    needs: [changes, static-check, build, test, integration-test, cve-check, e2e, docker, docker-manifest]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          # docker + docker-manifest are tag-gated; treat their 'skipped'
          # result on non-tag runs as a pass. Code-gated jobs
          # (static-check/build/test/IT) are also legitimately 'skipped' on
          # docs-only PRs. Any 'failure' or 'cancelled' result fails the gate.
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs were cancelled"
            exit 1
          fi
