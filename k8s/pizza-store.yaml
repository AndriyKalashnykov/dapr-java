apiVersion: apps/v1
kind: Deployment
metadata:
  name: pizza-store-deployment
spec:
  selector:
    matchLabels:
      app: pizza-store-service
  template:
    metadata:
      annotations:  
        dapr.io/app-id: pizza-store
        dapr.io/app-port: "8080"
        dapr.io/enabled: "true"
        dapr.io/log-level: "debug"
      labels:
        app: pizza-store-service
        app.kubernetes.io/name: pizza-store-service
        app.kubernetes.io/part-of: pizza-store-service
        app.kubernetes.io/version: 0.1.0
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: pizza-store-service
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        image: ghcr.io/andriykalashnykov/dapr-java/pizza-store:0.1.0
        imagePullPolicy: Always
        env:
        - name: JAVA_OPTS
          value: "-XX:+UseParallelGC -XX:ActiveProcessorCount=1 -XX:MaxRAMPercentage=75 -XX:TieredStopAtLevel=1"
        - name: STATE_STORE_NAME
          value: kvstore
        # Maps to Spring placeholder ${cors.allowed-origins} read by @CrossOrigin
        # in PizzaStore.java. Override per-environment via the manifest; the
        # localhost:5173 default in source is the dev fallback only.
        - name: CORS_ALLOWED_ORIGINS
          value: "http://localhost:5173"
        # OTLP/HTTP collector endpoint — points at the Jaeger Service in the
        # same namespace for e2e. Override per-environment for production
        # (managed OTel Collector / vendor endpoint).
        - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT
          value: "http://jaeger:4318/v1/traces"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
        # CPU/memory requests are 1/4 of limits to keep the K8s scheduler from
        # over-committing on small CI runners (GitHub ubuntu-latest = 4 vCPU /
        # 16 GiB). 3 pizza-* pods + 3 Dapr sidecars + Jaeger + Redis + Dapr
        # control plane exceed 4 CPU at requests=1, so the last pod scheduled
        # starves and its readinessProbe never settles in the 300 s rollout
        # budget. Limits stay at 1 CPU / 2 GiB so pods still burst during
        # Spring Boot + OTel SDK startup.
        resources:
          limits:
            cpu: "1"
            memory: "2Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pizza-store
spec:
  selector:
    app: pizza-store-service
  ports:
  - port: 80
    targetPort: 8080