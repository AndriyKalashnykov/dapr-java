---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: kind-pool
  namespace: metallb-system
spec:
  addresses:
    # The METALLB_IP_SUB placeholder (e.g. 172.18) is substituted at
    # `make kind-create` time from the `kind` Docker network subnet. This
    # guarantees the LoadBalancer IPs fall inside the KinD Docker bridge.
    - METALLB_IP_SUB.255.200-METALLB_IP_SUB.255.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: kind-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - kind-pool
